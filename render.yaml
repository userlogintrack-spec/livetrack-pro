services:
  # Web service — Daphne (ASGI for WebSockets + HTTP)
  - type: web
    name: livetrack-pro
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT tracker.asgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"

      # Django core
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a strong key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"     # add your custom domain later: ".onrender.com,yourdomain.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"

      # Database — external Neon Postgres (set this in Render dashboard, NOT here)
      - key: DATABASE_URL
        sync: false                # marks it as a secret you set manually in the dashboard

      # Redis — OPTIONAL. Leave unset for single-instance deployments (free tier).
      # When unset, Django falls back to InMemoryChannelLayer + LocMemCache automatically.
      # Add REDIS_URL only if you scale to multiple instances/workers.
      # - key: REDIS_URL
      #   sync: false

      # Stripe removed — using built-in card checkout

      # Behind Render's proxy
      - key: TRUST_X_FORWARDED_FOR
        value: "True"
