<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | LiveTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f3ff 0%,#ede9fe 50%,#e0e7ff 100%);}
        .auth-container{width:100%;max-width:440px;padding:20px;text-align:center;}
        .auth-card{background:white;border-radius:20px;padding:48px 40px;box-shadow:0 20px 60px rgba(99,102,241,0.08),0 1px 3px rgba(0,0,0,0.05);}
        .icon-wrap{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#10b981,#34d399);display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-bottom:20px;}
        h2{font-size:22px;font-weight:700;color:#1e1b4b;margin-bottom:8px;}
        p{color:#6b7280;font-size:14px;line-height:1.6;}
        .auth-footer{margin-top:24px;font-size:14px;color:#6b7280;}
        .auth-footer a{color:#6366f1;text-decoration:none;font-weight:600;}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="icon-wrap"><i class="fas fa-envelope-open-text"></i></div>
            <h2>Check your email</h2>
            <p>If an account exists with that email address, we've sent a password reset link. Please check your inbox and spam folder.</p>
        </div>
        <div class="auth-footer">
            <a href="{% url 'core:login' %}"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
        </div>
    </div>
</body>
</html>
