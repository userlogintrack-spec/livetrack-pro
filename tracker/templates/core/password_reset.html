<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | LiveVisitorHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f3ff 0%,#ede9fe 50%,#e0e7ff 100%);}
        .auth-container{width:100%;max-width:440px;padding:20px;}
        .auth-card{background:white;border-radius:20px;padding:40px;box-shadow:0 20px 60px rgba(99,102,241,0.08),0 1px 3px rgba(0,0,0,0.05);}
        .icon-wrap{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-size:22px;color:white;margin-bottom:20px;}
        h2{font-size:22px;font-weight:700;color:#1e1b4b;margin-bottom:6px;}
        .subtitle{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.5;}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
        .form-control{width:100%;padding:12px 16px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:10px;color:#111827;font-size:14px;font-family:inherit;transition:all .2s;}
        .form-control:focus{outline:none;border-color:#6366f1;background:white;box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
        .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 14px rgba(99,102,241,0.3);display:flex;align-items:center;justify-content:center;gap:8px;}
        .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.4);}
        .auth-footer{text-align:center;margin-top:20px;font-size:14px;color:#6b7280;}
        .auth-footer a{color:#6366f1;text-decoration:none;font-weight:600;}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="icon-wrap"><i class="fas fa-key"></i></div>
            <h2>Reset your password</h2>
            <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
            </form>
        </div>
        <div class="auth-footer">
            Remember your password? <a href="{% url 'core:login' %}">Sign in</a>
        </div>
    </div>
</body>
</html>
