<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — LiveVisitorHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f0a2e,#1a1145,#2d1b69);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center;padding:20px;}
        .container{max-width:500px;}
        .code{font-size:120px;font-weight:900;background:linear-gradient(135deg,#f87171,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
        h1{font-size:24px;font-weight:800;margin:16px 0 8px;}
        p{font-size:15px;color:#a09dc4;margin-bottom:28px;line-height:1.6;}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s;box-shadow:0 4px 16px rgba(124,58,237,0.3);}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.4);}
    </style>
</head>
<body>
    <div class="container">
        <div class="code">500</div>
        <h1>Something Went Wrong</h1>
        <p>We're experiencing a server issue. Our team has been notified. Please try again in a few moments.</p>
        <a href="/dashboard/" class="btn">Go to Dashboard</a>
    </div>
</body>
</html>
